name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Opt actions/checkout@v4, astral-sh/setup-uv@v4 etc. into Node 24
  # ahead of the Sept 2026 forced cutover. Drop once all pinned actions
  # ship a default-Node-24 release.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Python from python.org
        run: |
          curl -fsSL https://www.python.org/ftp/python/3.13.3/python-3.13.3-macos11.pkg -o /tmp/python.pkg
          sudo installer -pkg /tmp/python.pkg -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.13/bin" >> $GITHUB_PATH

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          FWPYTHON=/Library/Frameworks/Python.framework/Versions/3.13/bin/python3.13
          $FWPYTHON -m venv .venv
          .venv/bin/pip install -e '.[dev]'

      - name: Run tests
        run: .venv/bin/python -m pytest tests/ -v
