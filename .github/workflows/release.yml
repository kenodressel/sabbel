name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14  # Apple Silicon M1
    steps:
      - uses: actions/checkout@v4

      - name: Install Python from python.org
        run: |
          curl -fsSL https://www.python.org/ftp/python/3.13.3/python-3.13.3-macos11.pkg -o /tmp/python.pkg
          sudo installer -pkg /tmp/python.pkg -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.13/bin" >> $GITHUB_PATH

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra build --extra dev --python /Library/Frameworks/Python.framework/Versions/3.13/bin/python3.13

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Build Sabbel.app
        run: make build-app

      - name: Verify bundle is standalone
        run: |
          test -d dist/Sabbel.app/Contents/MacOS
          test -f dist/Sabbel.app/Contents/Info.plist
          test -f dist/Sabbel.app/Contents/Frameworks/mlx.metallib
          test -f dist/Sabbel.app/Contents/Frameworks/libpython3.13.dylib \
            && echo "✓ libpython embedded (standalone)" \
            || { echo "✗ libpython NOT embedded (semi-standalone)"; exit 1; }
          # Check no absolute paths leak
          LEAKS=$(find dist/Sabbel.app \( -name "*.dylib" -o -name "*.so" \) \
            -exec otool -L {} \; 2>/dev/null \
            | grep -E "^\t/(opt/homebrew|usr/local|Users)" || true)
          if [ -n "$LEAKS" ]; then
            echo "✗ Non-portable paths found:"
            echo "$LEAKS"
            exit 1
          fi
          echo "✓ No path leaks detected"
          echo "✓ Bundle verification passed"

      - name: Zip the app
        run: |
          cd dist
          ditto -ck --keepParent Sabbel.app Sabbel.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Sabbel.zip
          generate_release_notes: true
