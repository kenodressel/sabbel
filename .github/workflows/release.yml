name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14  # Apple Silicon M1
    steps:
      - uses: actions/checkout@v4

      - name: Install Python from python.org
        run: |
          curl -fsSL https://www.python.org/ftp/python/3.13.3/python-3.13.3-macos11.pkg -o /tmp/python.pkg
          sudo installer -pkg /tmp/python.pkg -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.13/bin" >> $GITHUB_PATH

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          FWPYTHON=/Library/Frameworks/Python.framework/Versions/3.13/bin/python3.13
          $FWPYTHON -m venv .venv
          .venv/bin/pip install -e '.[build,dev]'

      - name: Run tests
        run: .venv/bin/python -m pytest tests/ -v

      - name: Build Sabbel.app
        run: |
          .venv/bin/python setup.py py2app
          # Post-build fixups (same as Makefile)
          METALLIB=$(find .venv -name "mlx.metallib" -type f 2>/dev/null | head -1)
          [ -n "$METALLIB" ] && cp "$METALLIB" dist/Sabbel.app/Contents/Frameworks/mlx.metallib
          MLX_PKG=$(find .venv -type d -name "mlx" -path "*/site-packages/mlx" | head -1)
          if [ -n "$MLX_PKG" ]; then
            PYVER=$(ls dist/Sabbel.app/Contents/Resources/lib/ | grep python3 | grep -v zip | head -1)
            DEST=dist/Sabbel.app/Contents/Resources/lib/$PYVER/mlx
            mkdir -p "$DEST"
            cp -R "$MLX_PKG"/* "$DEST"/
          fi
          ZIPFILE=$(find dist/Sabbel.app/Contents/Resources/lib -name "python3*.zip" | head -1)
          [ -n "$ZIPFILE" ] && python3 -c "import zipfile,shutil; src='$ZIPFILE'; tmp=src+'.tmp'; zi=zipfile.ZipFile(src,'r'); zo=zipfile.ZipFile(tmp,'w'); [zo.writestr(i,zi.read(i.filename)) for i in zi.infolist() if not i.filename.startswith('mlx/')]; zi.close(); zo.close(); shutil.move(tmp,src)"
          CORE_SO=$(find dist/Sabbel.app -name "core.so" -path "*/mlx/*" 2>/dev/null | head -1)
          if [ -n "$CORE_SO" ]; then
            install_name_tool -add_rpath @executable_path/../Frameworks "$CORE_SO" 2>/dev/null || true
            codesign --force --sign - "$CORE_SO" 2>/dev/null || true
          fi
          echo "✓ Built dist/Sabbel.app"

      - name: Verify bundle is standalone
        run: |
          test -d dist/Sabbel.app/Contents/MacOS
          test -f dist/Sabbel.app/Contents/Info.plist
          test -f dist/Sabbel.app/Contents/Frameworks/mlx.metallib
          test -f dist/Sabbel.app/Contents/Frameworks/libpython3.13.dylib \
            && echo "✓ libpython embedded (standalone)" \
            || { echo "✗ libpython NOT embedded (semi-standalone)"; exit 1; }
          # Check no absolute paths leak
          LEAKS=$(find dist/Sabbel.app \( -name "*.dylib" -o -name "*.so" \) \
            -exec otool -L {} \; 2>/dev/null \
            | grep -E "^\t/(opt/homebrew|usr/local|Users)" || true)
          if [ -n "$LEAKS" ]; then
            echo "✗ Non-portable paths found:"
            echo "$LEAKS"
            exit 1
          fi
          echo "✓ No path leaks detected"
          echo "✓ Bundle verification passed"

      - name: Zip the app
        run: |
          cd dist
          ditto -ck --keepParent Sabbel.app Sabbel.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Sabbel.zip
          generate_release_notes: true
